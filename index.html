<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <header class="site-header">
        <div class="logo">City<span>Dashboard</span></div>
    </header>

    <main>

        <!-- Environmental Sensors -->
        <section class="section-card">
            <div class="section-header">
                <h2><span class="icon">🌿</span> Environmental Sensor Data</h2>
            </div>
            <div class="section-body">
                <div class="chart-grid">
                    <div class="chart-card map-card">
                        <h4>📍 Sensor Location</h4>
                        <p class="location-text" id="envLocationLabel"><span class="skeleton"></span></p>
                        <div id="sensorMap"></div>
                    </div>
                    <div class="chart-card">
                        <h4>🌡 Temperature</h4>
                        <canvas id="temperatureChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h4>💧 Humidity</h4>
                        <canvas id="humidityChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h4>☀️ Brightness</h4>
                        <canvas id="brightnessChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- Noise Pollution -->
        <section class="section-card">
            <div class="section-header">
                <h2><span class="icon">🔊</span> Noise Pollution</h2>
            </div>
            <div class="section-body">
                <div class="chart-grid">
                    <div class="chart-card map-card">
                        <h4>📍 Sensor Location</h4>
                        <p class="location-text" id="noiseLocationLabel"><span class="skeleton"></span></p>
                        <div id="noiseMap"></div>
                    </div>
                    <div class="chart-card">
                        <h4>🔊 Noise Level (dB)</h4>
                        <canvas id="noiseChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h4>📊 Classification</h4>
                        <canvas id="noiseClassChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- Traffic & Footfall -->
        <section class="section-card">
            <div class="section-header">
                <h2><span class="icon">🚦</span> Traffic &amp; Footfall</h2>
            </div>
            <div class="section-body">
                <p class="placeholder">No data source connected yet.</p>
            </div>
        </section>

        <!-- Flood & Weather -->
        <section class="section-card">
            <div class="section-header">
                <h2><span class="icon">🌧</span> Flood &amp; Weather</h2>
            </div>
            <div class="section-body">
                <p class="placeholder">No data source connected yet.</p>
            </div>
        </section>

    </main>

    <script type="module" src="main.js"></script>

</body>

</html>
